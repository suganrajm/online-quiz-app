spring.application.name=online-quiz-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/online_quiz_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password={Your-password-here}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
logging.file.name=app.log

# JWT Configuration
jwt.secret=OnlineQuizAppSecretKey2024SuperSecureKeyForJWTTokenGeneration
jwt.expiration=86400000

# Server Port
server.port=8080

# Logging
logging.level.com.onlinequiz=DEBUG
